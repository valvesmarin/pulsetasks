<!DOCTYPE html>
<html lang="pt" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PulseTasks</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="output.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 min-h-screen font-sans">

  <!-- Header -->
  <header class="bg-white dark:bg-zinc-900 border-b sticky top-0 z-50 shadow-sm">
    <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
      <div class="flex items-center gap-4">
        <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-purple-600 rounded-2xl flex items-center justify-center text-white text-3xl font-bold">P</div>
        <h1 class="text-4xl font-bold tracking-tighter">PulseTasks</h1>
      </div>
      <button id="dark-mode-toggle" class="flex items-center gap-3 px-6 py-3 bg-zinc-100 dark:bg-zinc-800 rounded-3xl hover:bg-zinc-200 transition-all">
        <span id="theme-icon">🌙</span>
        <span id="theme-text">Modo Escuro</span>
      </button>
    </div>
  </header>

  <div class="max-w-6xl mx-auto px-6 py-10">
    <!-- Stats -->
    <div id="stats" class="flex gap-6 mb-8 text-sm"></div>

    <!-- Form + Filtros -->
    <div class="flex flex-col lg:flex-row gap-4 mb-8">
      <form id="task-form" class="flex-1 flex gap-4">
        <!-- input, selects, botão -->
      </form>
      
      <div class="flex gap-4">
        <select id="filter-priority" class="px-6 py-3 bg-white dark:bg-zinc-900 border rounded-3xl">
          <option value="">Todas prioridades</option>
          <option value="high">Alta</option>
          <option value="medium">Média</option>
          <option value="low">Baixa</option>
        </select>
        <select id="sort-select" class="px-6 py-3 bg-white dark:bg-zinc-900 border rounded-3xl">
          <option value="newest">Mais recentes</option>
          <option value="oldest">Mais antigas</option>
          <option value="priority">Prioridade</option>
          <option value="title">Alfabética</option>
        </select>
      </div>
    </div>

    <input id="search-input" placeholder="🔍 Buscar tarefas..." class="w-full px-6 py-5 bg-white dark:bg-zinc-900 border rounded-3xl mb-8">

    <!-- Lista de tarefas -->
    <div id="task-list" class="space-y-4 min-h-[400px]"></div>
  </div>

  <!-- Modal de edição -->
  <div id="edit-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-white dark:bg-zinc-900 rounded-3xl p-8 w-full max-w-md">
      <!-- conteúdo do modal -->
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="hidden fixed bottom-6 right-6 bg-zinc-900 text-white px-6 py-4 rounded-3xl shadow-2xl flex items-center gap-3"></div>

<script src="app.js"></script>
</body>
</html>
