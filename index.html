<!DOCTYPE html>
<html lang="pt" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PulseTasks</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="output.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 min-h-screen font-sans antialiased">

  <header class="bg-white dark:bg-zinc-900 border-b border-zinc-200 dark:border-zinc-800 sticky top-0 z-50 shadow-sm">
    <div class="max-w-6xl mx-auto px-6 py-5 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-purple-600 rounded-2xl flex items-center justify-center text-white text-3xl font-bold shadow-lg">P</div>
        <h1 class="text-4xl font-bold tracking-tighter text-zinc-900 dark:text-white">PulseTasks</h1>
      </div>
      
      <button id="dark-mode-toggle" 
              class="flex items-center gap-3 px-6 py-3 bg-zinc-100 dark:bg-zinc-800 hover:bg-zinc-200 dark:hover:bg-zinc-700 rounded-3xl transition-all font-medium text-sm">
        <span id="theme-icon" class="text-xl">🌙</span>
        <span id="theme-text">Modo Escuro</span>
      </button>
    </div>
  </header>

  <div class="max-w-6xl mx-auto flex gap-8 px-6 py-10">
    <!-- Sidebar -->
    <aside class="w-72 hidden lg:block">
      <div class="bg-white dark:bg-zinc-900 rounded-3xl p-6 border border-zinc-100 dark:border-zinc-800 shadow">
        <h3 class="uppercase text-xs font-semibold tracking-widest text-zinc-500 dark:text-zinc-400 mb-5">Categorias</h3>
        <ul class="space-y-2">
          <li class="px-5 py-3 rounded-2xl hover:bg-zinc-100 dark:hover:bg-zinc-800 cursor-pointer transition-colors flex items-center gap-3">💼 Trabalho</li>
          <li class="px-5 py-3 rounded-2xl hover:bg-zinc-100 dark:hover:bg-zinc-800 cursor-pointer transition-colors flex items-center gap-3">👤 Pessoal</li>
          <li class="px-5 py-3 rounded-2xl hover:bg-zinc-100 dark:hover:bg-zinc-800 cursor-pointer transition-colors flex items-center gap-3">📚 Estudo</li>
        </ul>
      </div>
    </aside>

    <!-- Main -->
    <main class="flex-1">
      <form id="task-form" class="bg-white dark:bg-zinc-900 rounded-3xl p-8 shadow border border-zinc-100 dark:border-zinc-800 mb-10">
        <div class="flex flex-col md:flex-row gap-4">
          <input id="task-input" type="text" placeholder="O que você precisa fazer hoje?" 
                 class="flex-1 px-6 py-5 bg-zinc-50 dark:bg-zinc-800 border border-transparent focus:border-blue-500 rounded-3xl text-lg outline-none">
          
          <select id="category-select" class="px-6 py-5 bg-zinc-50 dark:bg-zinc-800 border border-transparent rounded-3xl">
            <option value="Trabalho">Trabalho</option>
            <option value="Pessoal">Pessoal</option>
            <option value="Estudo">Estudo</option>
          </select>
          
          <select id="priority-select" class="px-6 py-5 bg-zinc-50 dark:bg-zinc-800 border border-transparent rounded-3xl">
            <option value="high">Alta</option>
            <option value="medium">Média</option>
            <option value="low">Baixa</option>
          </select>
          
          <button type="submit" 
                  class="bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white font-semibold px-10 rounded-3xl shadow-lg transition-all">
            + Adicionar
          </button>
        </div>
      </form>

      <input id="search-input" type="text" placeholder="🔍 Buscar tarefas..." 
             class="w-full px-6 py-5 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-700 rounded-3xl mb-10 focus:outline-none focus:border-blue-500">

      <section id="task-list" class="space-y-4"></section>

      <!-- Empty state -->
      <div id="empty-state" class="hidden text-center py-20">
        <p class="text-6xl mb-4">📭</p>
        <p class="text-xl text-zinc-400 dark:text-zinc-600">Nenhuma tarefa ainda...</p>
        <p class="text-sm text-zinc-500 mt-2">Adicione sua primeira tarefa acima!</p>
      </div>
    </main>
  </div>

<script src="app.js"></script>
<!--Força todas as classes dark -->
<div class="hidden 
  dark:bg-zinc-950 dark:bg-zinc-900 dark:text-zinc-100 dark:text-zinc-400 
  dark:bg-red-950/30 dark:border-red-800 dark:text-red-400 
  dark:bg-amber-950/30 dark:border-amber-800 dark:text-amber-400 
  dark:bg-green-950/30 dark:border-green-800 dark:text-green-400 
  dark:hover:bg-red-900/30 dark:hover:bg-amber-900/30 dark:hover:bg-green-900/30
  opacity-75 line-through text-zinc-500 dark:text-white">
</div>
</body>
</html>
