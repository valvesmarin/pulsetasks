<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PulseTasks</title>

  <!-- Tailwind v4 via CDN oficial -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Configuração personalizada inline -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#6366f1',
            secondary: '#a855f7',
            accent: '#ec4899'
          }
        }
      }
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-100 dark:from-gray-950 dark:to-gray-900 min-h-screen font-sans antialiased text-gray-900 dark:text-gray-100">

  <header class="sticky top-0 z-50 bg-white/90 dark:bg-gray-900/90 backdrop-blur-xl border-b border-gray-200/50 dark:border-gray-800/50 shadow-sm">
    <div class="max-w-6xl mx-auto px-6 py-5 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <div class="w-12 h-12 bg-gradient-to-br from-indigo-500 via-purple-600 to-pink-500 rounded-2xl flex items-center justify-center text-white text-3xl font-bold shadow-xl hover:scale-105 transition-transform">
          P
        </div>
        <h1 class="text-3xl font-bold tracking-tight bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent" id="app-title">
          PulseTasks
        </h1>
      </div>

      <div class="flex items-center gap-4">
        <select id="lang-select" class="bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-full px-5 py-2 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-indigo-400 transition">
          <option value="es">Español</option>
          <option value="pt">Português</option>
          <option value="en">English</option>
        </select>

        <button id="theme-toggle" class="flex items-center gap-3 px-6 py-3 bg-white dark:bg-gray-800 rounded-full shadow-md hover:shadow-lg transition-all active:scale-95">
          <span id="theme-icon">🌙</span>
          <span id="theme-text">Modo Oscuro</span>
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-16">
    <form id="task-form" class="bg-white dark:bg-gray-900/90 backdrop-blur-md p-10 rounded-3xl shadow-2xl border border-gray-200/30 dark:border-gray-800/30 mb-16">
      <div class="flex flex-col md:flex-row gap-5">
        <input id="task-input" type="text" placeholder="¿Qué necesitas hacer hoy?" required
               class="flex-1 px-7 py-5 text-lg bg-gray-50 dark:bg-gray-800 border border-transparent rounded-2xl focus:border-indigo-500 focus:ring-4 focus:ring-indigo-200 dark:focus:ring-indigo-900/30 outline-none transition">
        
        <select id="category-select" class="px-7 py-5 bg-gray-50 dark:bg-gray-800 border border-transparent rounded-2xl focus:border-indigo-500 focus:ring-4 focus:ring-indigo-200 dark:focus:ring-indigo-900/30 outline-none">
          <option value="Trabajo">Trabajo</option>
          <option value="Personal">Personal</option>
          <option value="Estudio">Estudio</option>
          <option value="Salud">Salud</option>
          <option value="Otros">Otros</option>
        </select>

        <select id="priority-select" class="px-7 py-5 bg-gray-50 dark:bg-gray-800 border border-transparent rounded-2xl focus:border-indigo-500 focus:ring-4 focus:ring-indigo-200 dark:focus:ring-indigo-900/30 outline-none">
          <option value="high">Alta</option>
          <option value="medium">Media</option>
          <option value="low">Baja</option>
        </select>

        <button type="submit" class="px-12 py-5 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-semibold rounded-2xl shadow-lg transition-all active:scale-95">
          Añadir
        </button>
      </div>
    </form>

    <div class="flex flex-wrap gap-5 mb-12">
      <button id="clear-completed" class="px-8 py-4 bg-red-50 dark:bg-red-900/20 text-red-700 dark:text-red-300 rounded-full hover:bg-red-100 dark:hover:bg-red-900/30 transition-all font-medium shadow-sm hover:shadow-md">
        Limpiar completadas
      </button>
    </div>

    <div id="task-list" class="space-y-6"></div>

    <div id="empty-state" class="hidden text-center py-40">
      <div class="text-9xl mb-10 opacity-60">📭</div>
      <h2 id="empty-title" class="text-4xl font-semibold text-gray-400 dark:text-gray-600 mb-5">Aún no hay tareas</h2>
      <p id="empty-message" class="text-xl text-gray-500 dark:text-gray-600">¡Añade tu primera tarea arriba!</p>
    </div>
  </main>

  <div id="toast" class="hidden fixed bottom-10 right-10 px-8 py-5 rounded-3xl shadow-2xl text-white font-medium transition-all duration-400"></div>

  <script src="app.js"></script>
</body>
</html>
